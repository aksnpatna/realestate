# Define rate limiting zone (10MB memory, ~160,000 IPs), 20 reqs/sec
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

server {
    listen 80;
    server_name realestate.akstest.win localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream names resolve at request time
    resolver 127.0.0.11 valid=30s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript text/xml application/javascript application/json application/xml+rss image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: https: wss:; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:;" always;

    # ── Hashed Vite assets — cache forever (content hash changes on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Favicon and icons — short cache
    location ~* \.(ico|svg|png|jpg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── index.html — NEVER cache; always fetch fresh from server
    # This is the root cause of stale UI: browsers and Cloudflare cache index.html
    # which points to OLD hashed JS/CSS bundles. Setting no-store here ensures
    # users always get the latest pointer to the latest hashed bundles.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # API Proxy — variable forces runtime DNS resolution, preventing startup failures
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        set $upstream realestate-backend;
        proxy_pass http://$upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Tile Server Proxy — Routes Mapbox Vector Tiles from pg_tileserv
    location /tiles/ {
        set $tileserv realestate-tileserv;
        rewrite ^/tiles/(.*) /$1 break;
        proxy_pass http://$tileserv:7800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Metrics proxy — Prometheus for observability
    location /metrics {
        set $upstream realestate-backend;
        proxy_pass http://$upstream:8000/metrics;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA fallback — serve index.html for all non-file routes (also no-cache)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
