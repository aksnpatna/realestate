services:
  realestate:
    build: .
    container_name: realestate-engine
    ports:
      - "8082:80"
    restart: unless-stopped
    tmpfs:
      - /var/cache/nginx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realestate-backend
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  osm-updater:
    build:
      context: ./backend
      dockerfile: Dockerfile.osm
    container_name: realestate-osm-updater
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy

  tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: realestate-tileserv
    restart: unless-stopped
    ports:
      - "7800:7800"
    environment:
      - DATABASE_URL=postgres://realestate_user:realestate_pass@db:5432/realestate
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: realestate-db
    restart: unless-stopped
    # Tuned for mini PC: shared_buffers=512MB, effective_cache_size=2GB
    # This stops Postgres from hitting disk on every query for a 28GB dataset
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c log_min_duration_statement=2000
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate_user -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
