services:
  realestate:
    build: .
    container_name: realestate-engine
    ports:
      - "8082:80"
    restart: unless-stopped
    tmpfs:
      - /var/cache/nginx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realestate-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  osm-updater:
    build:
      context: ./backend
      dockerfile: Dockerfile.osm
    container_name: realestate-osm-updater
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: realestate-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate_user -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
